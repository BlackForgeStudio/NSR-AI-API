name: ✨ API Feature Request
description: Suggest a new API feature or endpoint
title: "[API FEATURE] - "
labels: ["api", "enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Proposal
        Describe the API feature clearly.

  - type: input
    id: endpoint
    attributes:
      label: 🔗 Related Endpoint
      placeholder: e.g., /v1/chat or NEW endpoint

  - type: textarea
    id: use_case
    attributes:
      label: 📌 Use Case
      description: Why is this feature needed?
      placeholder: Developers need streaming responses for real-time chat.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 🛠 Proposed API Design
      description: Provide example request/response format.
      render: json
      placeholder: |
        POST /v1/chat/stream
        {
          "model": "nsr-ai-pro",
          "stream": true
        }

        Response:
        event: message
        data: partial response

    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      placeholder: Polling instead of streaming.

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Notes
      description: Any extra details, references, or examples.
